{#-
    Admin - Termine: Lösch-Bestätigung
-#}
{% extends 'admin/layout.html' %}
{% block content %}
  <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow border border-gray-200">
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Termin wirklich löschen?</h1>
    <p class="text-gray-700 mb-6">
      Der Termin
      „<strong>{{ termin.titel }}</strong>“
      vom {{ termin.datum.strftime('%d.%m.%Y') }}
      wird unwiderruflich gelöscht.
    </p>

    <form method="POST"
          action="{{ url_for('admin.termin_loeschen', termin_id=termin.id) }}">
      {{ form.csrf_token }}
      <div class="flex flex-wrap items-center gap-4">
        <button type="submit"
                class="px-6 py-2 text-white bg-red-600 rounded-lg hover:bg-red-800 focus:ring-4 focus:ring-red-300">
          Ja, endgültig löschen
        </button>
        <a href="{{ url_for('admin.termine_list') }}" class="text-gray-700 hover:underline">
          Abbrechen
        </a>
      </div>
    </form>
  </div>
{% endblock %}
